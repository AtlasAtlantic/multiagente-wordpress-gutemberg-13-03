[features]
multi_agent = true

[agents]
max_threads = 4
max_depth = 1

[agents.planner]
description = "Convierte la solicitud en un plan ejecutable y decide el perfil WordPress aplicable."
config_file = "agents/planner.toml"

[agents.builder]
description = "Implementa cambios siguiendo el plan aprobado y las restricciones del repo."
config_file = "agents/builder.toml"

[agents.reviewer]
description = "Revisa correccion, regresiones, seguridad y falta de evidencia."
config_file = "agents/reviewer.toml"

[agents.qa]
description = "Valida quality gates y decide cierre o retorno a implementacion."
config_file = "agents/qa.toml"
