version: 1
policies:
  - id: codex-config-changes
    description: Validaciones minimas para cambios de configuracion Codex.
    when_paths_match:
      - ".codex/**"
      - "AGENTS.md"
    required_commands:
      - ".codex/tools/update-codex-rules-index.sh"
      - ".codex/tools/validate-codex-rules.sh"
      - ".codex/tools/validate-codex-readme.sh"
      - ".codex/tools/validate-codex-skills.sh"
