id: block-theme-development
project_kinds:
  - block-theme
summary: Block theme con `theme.json`, templates, parts y Site Editor.
primary_skills:
  - wp-block-themes
  - web-accessibility
  - frontend-responsive-design-standards
secondary_skills:
  - wp-performance
  - e2e-testing-patterns
reference_skills:
  - modern-javascript-patterns
  - scss-best-practices
required_gates:
  - theme_json
  - editor_frontend_parity
  - accessibility
  - responsive
optional_gates: []
required_checks: []
optional_checks:
  - build
  - lint
  - tests
  - e2e
check_expectations:
  build:
    expected_when:
      - package.json presente en theme
    include_when:
      - la tarea pide build, assets, css/js compilado o bundling
      - el cambio afecta assets del block theme que requieren compilacion
  lint:
    expected_when:
      - tooling de lint presente en el theme
    include_when:
      - la tarea pide lint o revision de calidad
      - el cambio afecta archivos del theme con tooling de lint aplicable
  tests:
    expected_when:
      - tests automatizados presentes
    include_when:
      - la tarea pide tests o smoke validation
      - el cambio toca flujo funcional cubierto por tests del theme
  e2e:
    expected_when:
      - Playwright o Cypress presentes
    include_when:
      - la tarea pide e2e o regresion visual/funcional
      - el cambio afecta Site Editor o UI cubierta por la suite
      - la tarea cambia `theme.json`, templates, parts o patterns con impacto visible y existe infraestructura e2e reutilizable
      - la tarea corrige una incidencia o bug visual/funcional reproducible en el block theme y existe infraestructura e2e reutilizable
gate_expectations:
  theme_json:
    expected_when:
      - la tarea toca theme.json, templates, parts o patterns
  editor_frontend_parity:
    expected_when:
      - la tarea afecta estilos o estructura visible
not_applicable_policy:
  - Si la tarea no toca salida visual ni editor, los gates visuales pueden marcarse `not_applicable` con razon.
  - Si la tarea cambia salida visual relevante y deberia llevar e2e pero no existe base reutilizable, pedir confirmacion para montarla antes de dejar `e2e` como `not_applicable`, salvo exclusion explicita de tests.
  - Si la tarea corrige una incidencia o bug visual/funcional que deberia quedar cubierto y no existe base reutilizable, pedir confirmacion para montarla antes de dejar `e2e` como `not_applicable`, salvo exclusion explicita de tests.
