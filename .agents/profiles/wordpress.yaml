version: v2
profile: wordpress
kind: wordpress
description: Legacy umbrella profile for WordPress repositories. Prefer specific WordPress profiles plus infrastructure and project context.
project_type: wordpress
stack:
  runtime:
    - wordpress
    - php
  orchestration: []
  cli:
    - wp-cli
paths: {}
services: {}
tool_preferences: {}
applicable_pipelines:
  - feature
  - bugfix
  - refactor
  - audit
recommended_skills:
  - wordpress-project-setup
  - docker-wordpress-stack
checks: []
notes:
  - prefer `wordpress-plugin`, `wordpress-theme`, `wordpress-block-theme`, or `wordpress-hybrid` for reusable modeling
  - combine with `docker-wordpress-standard` when Docker is part of the stack
  - keep repository-specific paths, services, and checks in `.agents/project/project.yaml`
