pipelines:
  wp-feature-v1:
    description: Flujo de entrega de features con validacion tecnica y funcional.
    stages:
      - id: planner
        on_success: builder
        on_blocked: failed
      - id: builder
        on_success: reviewer
        on_blocked: failed
      - id: reviewer
        on_success: qa
        on_changes_requested: builder
        on_blocked: failed
      - id: qa
        on_success: done
        on_fail: builder

agents:
  planner:
    objective: Convertir la solicitud en un plan completo y ejecutable sin decisiones abiertas.
    input_required:
      - task_context
      - repository_constraints
      - requested_outcome
    output_schema:
      - plan_title
      - summary
      - selected_profile
      - loaded_skills
      - implementation_steps
      - acceptance_criteria
      - required_gates
      - required_checks
      - assumptions
      - risks
      - status
    blocking_conditions:
      - falta de contexto no inferible del repositorio
      - contradiccion de requisitos de alto impacto

  builder:
    objective: Implementar los cambios segun el plan y registrar decisiones tecnicas.
    input_required:
      - approved_plan
      - assumptions
      - constraints
    output_schema:
      - changed_files
      - patch_summary
      - decisions
      - checks_run
      - status
    blocking_conditions:
      - dependencia externa bloqueada sin alternativa
      - conflicto tecnico no resuelto con el plan

  reviewer:
    objective: Revisar riesgos funcionales, seguridad y regresiones antes de QA.
    input_required:
      - changed_files
      - patch_summary
      - checks_run
    output_schema:
      - findings
      - requested_changes
      - residual_risks
      - status
    blocking_conditions:
      - cambios no revisables por falta de evidencia
      - fallos criticos en seguridad o compatibilidad

  qa:
    objective: Verificar gates de calidad y decidir cierre o retorno a builder.
    input_required:
      - reviewer_report
      - checks_run
      - acceptance_criteria
    output_schema:
      - gate_results
      - verification_report
      - status
      - decision
      - rollback_notes
    blocking_conditions:
      - entorno de verificacion inaccesible sin alternativa documentada

handoff_schema:
  scope: orchestration_metadata
  required_fields:
    - task_id
    - stage
    - task_context
    - constraints
    - decisions
    - changed_files
    - checks_run
    - risks
    - status
  status_values:
    - pending
    - in_progress
    - blocked
    - done
    - failed
    - changes_requested

artifacts:
  required:
    - id: plan
      description: Plan tecnico decision-complete antes de implementar.
      owner: planner
      embedded_in_agent_output: true
    - id: patch_summary
      description: Resumen de cambios aplicados y decisiones de implementacion.
      owner: builder
      embedded_in_agent_output: true
    - id: verification_report
      description: Resultado de validaciones, findings y estado final.
      owner: qa
      embedded_in_agent_output: true

quality_contract:
  policy: extended
  gate_result_values:
    - passed
    - failed
    - not_applicable
  check_result_values:
    - passed
    - failed
    - not_applicable
  common_required_gates:
    - artifacts_present
    - profile_selected
  profile_source: ./.agents/profiles/*.yaml
  gates_catalog:
    - id: artifacts_present
      description: Los artefactos requeridos por el pipeline estan presentes.
      when: always
    - id: profile_selected
      description: El planner selecciona perfil valido antes de implementar.
      when: always
    - id: architecture
      description: La arquitectura propuesta e implementada es coherente con el dominio y el repo.
      when: required_for_plugin_or_backend_changes
    - id: security
      description: Validaciones de seguridad WordPress aplicables pasan.
      when: required_for_wp_code
    - id: performance
      description: Verificacion de impacto de rendimiento cuando aplica.
      when: required_for_performance_sensitive_changes
    - id: accessibility
      description: La salida visual cumple requisitos de accesibilidad aplicables.
      when: required_for_ui_changes
    - id: responsive
      description: La salida visual mantiene comportamiento responsive esperado.
      when: required_for_ui_changes
    - id: theme_json
      description: "theme.json y sus efectos son coherentes y validos."
      when: required_for_block_theme_changes
    - id: editor_frontend_parity
      description: El editor y el frontend mantienen paridad razonable cuando aplica.
      when: required_for_block_theme_or_block_ui_changes
    - id: scope_isolation
      description: El cambio se limita al target correcto dentro de repos full-site.
      when: required_for_multi-target_repos
    - id: no_inline_style_in_content
      description: No incluir etiquetas style embebidas dentro del HTML de salida de bloques.
      when: required_for_dynamic_block_rendering
    - id: packaging
      description: El empaquetado o release mantiene integridad y estructura esperadas.
      when: required_for_release_or_packaging_changes
    - id: migrations
      description: Activation, uninstall, schema y cron persistente quedan seguros y coherentes.
      when: required_for_persistent_data_or_lifecycle_changes
  checks_catalog:
    - id: build
      description: Build o compilacion disponible finaliza sin error.
      when: always_if_available
    - id: lint
      description: Lint disponible se ejecuta sin errores bloqueantes.
      when: always_if_available
    - id: static_analysis
      description: Analisis estatico disponible se ejecuta sin errores bloqueantes.
      when: required_if_phpstan_or_equivalent_exists
    - id: tests
      description: Tests automatizados clave pasan.
      when: always_if_available
    - id: e2e
      description: Pruebas E2E para flujos criticos cuando existen.
      when: required_if_e2e_suite_exists

planning_resolution:
  required_gates:
    derive_from:
      - quality_contract.common_required_gates
      - profile.required_gates
      - applicable_domain_gates_if_explicitly_required
  required_checks:
    derive_from:
      - profile.required_checks
      - profile.optional_checks_when_expected_when_matches
      - include_only_checks_justified_by_request_scope_or_change_impact
      - require_tooling_or_explicit_execution_path_for_each_selected_check
  loaded_skills:
    order:
      - router.required_skill
      - profile.primary_skills
      - domain.required_skills_by_domain
      - profile.secondary_skills_if_justified
      - profile.reference_skills_only_if_needed
    rules:
      - deduplicate_loaded_skills_preserving_first_match
      - always_include_router_required_skill_for_wordpress_tasks
      - include_domain_skills_only_when_detected_domain_or_request_matches
      - include_secondary_skills_only_with_repo_evidence_tooling_or_explicit_requirement
      - if_plugin_task_is_a_reproducible_block_or_editor_bug_require_e2e_testing_patterns_as_secondary_skill
      - never_include_reference_skills_by_default
      - in_full_site_wordpress_require_target_selection_before_cross_domain_secondary_skills
      - in_full_site_wordpress_if_request_points_to_plugin_theme_block_theme_or_rest_isolate_target_before_expanding_domain_skills
      - after_unique_target_isolated_switch_to_target_domain_resolution_instead_of_staying_ambiguous
      - if_rest_request_resolves_to_plugin_target_require_wp_rest_api_and_wordpress_security_validation
      - if_same_skill_is_selected_by_multiple_sources_keep_highest_priority_position
    justification_required_for:
      - profile.secondary_skills
      - profile.reference_skills

done_policy:
  closed_by: qa
  close_task_when:
    - pipeline_status == done
    - all_required_gates in [passed, not_applicable_with_reason]
    - required_artifacts_present == true

fallbacks:
  on_agent_error:
    action: return_to_previous_stage
    include:
      - blocker_summary
      - required_actions
      - evidence
